<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - PettahFinds</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;800&amp;display=swap" rel="stylesheet"/>

                        "primary-fixed": "#a0f0f0",
                        "on-secondary-container": "#663400",

                        "on-tertiary-fixed-variant": "#004f50",
                        "on-secondary-fixed": "#2f1500",
                        "primary-container": "#0d6e6e",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f3f0ee",
                        "surface-container-highest": "#e5e2e0",
                        "surface": "#fcf9f6",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    },
                    "spacing": {

                    },
                    "fontFamily": {

                }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#FAFAF8] dark:bg-stone-950 fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 border-b border-[#E8E8E4] dark:border-stone-800">
<button class="text-[#0D6E6E] dark:text-teal-400 hover:bg-[#F2F2EF] dark:hover:bg-stone-900 transition-all duration-200 active:opacity-70 w-10 h-10 flex items-center justify-center rounded-full" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-xl font-extrabold text-[#0D6E6E] dark:text-teal-500">PettahFinds</span>
<div class="w-10"></div>
</header>
<!-- Main Content Area -->
<main class="pt-[88px] pb-xl px-container-padding flex flex-col items-center justify-center min-h-screen">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-display-md text-display-md text-on-surface mb-sm">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join the local wholesale community and start sourcing today.</p>
</div>
<!-- Registration Form -->
<form class="space-y-md">
<!-- Full Name -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="fullName">Full Name</label>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullName" placeholder="e.g. Nimal Perera" type="text"/>
</div>
<!-- Business Name (Optional) -->
<div>
<div class="flex justify-between items-baseline mb-xs">
<label class="block font-label-bold text-label-bold text-on-surface" for="businessName">Business Name</label>
<span class="font-label-sm text-label-sm text-outline font-normal">(Optional)</span>
</div>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="businessName" placeholder="e.g. Perera Traders" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="email">Email Address</label>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Phone -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="phone">Phone Number</label>
<input class="w-full h-12 px-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="phone" placeholder="07X XXX XXXX" type="tel"/>
</div>
<!-- Password -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 pl-md pr-12 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="Create a strong password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors flex items-center justify-center w-8 h-8 rounded-full focus:outline-none focus:bg-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-sm pt-sm pb-xs">
<div class="flex items-center h-5 mt-[2px]">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer transition-colors" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-[14px] leading-relaxed text-on-surface-variant cursor-pointer" for="terms">
                        I agree to the <a class="text-primary font-label-bold hover:underline decoration-primary/50 underline-offset-2" href="#">Terms and Conditions</a> and <a class="text-primary font-label-bold hover:underline decoration-primary/50 underline-offset-2" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 mt-md bg-primary text-on-primary rounded-lg font-label-bold text-label-bold flex items-center justify-center gap-sm hover:bg-tertiary-container transition-colors shadow-[0px_4px_20px_rgba(17,17,16,0.06)] active:scale-[0.98]" type="button">
                    Join PettahFinds
                </button>
</form>
<!-- Sign In Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-bold text-primary hover:text-tertiary-container transition-colors ml-1" href="#">Sign In</a>
</p>
</div>
</div>
</main>
</body></html>
