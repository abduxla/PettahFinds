<body class="bg-background text-on-background min-h-screen flex flex-col justify-center px-container-padding font-body-md antialiased">
<!-- Top Navigation (Suppressed for Transactional Intent, only Logo shown) -->
<header class="fixed top-0 left-0 w-full flex justify-center items-center h-16 z-50 bg-background/80 backdrop-blur-sm border-b border-surface-variant">
<div class="text-primary-container font-display-md text-display-md flex items-center">
            PettahFinds<span class="text-secondary-container ml-1">.</span>
</div>
</header>
<main class="w-full max-w-md mx-auto pt-24 pb-12 flex-grow flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-lg text-center">
<h1 class="font-display-lg text-display-lg text-on-surface mb-sm">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access Colombo's wholesale marketplace.</p>
</div>
<!-- Form Section -->
<form class="space-y-md bg-surface-container-lowest p-lg rounded-xl shadow-[0px_4px_20px_rgba(17,17,16,0.06)] border border-surface-variant">
<!-- Email Field -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface text-on-surface border border-surface-variant rounded-lg py-3 pl-10 pr-4 focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md text-body-md transition-colors" id="email" name="email" placeholder="merchant@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary-container hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface text-on-surface border border-surface-variant rounded-lg py-3 pl-10 pr-10 focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md text-body-md transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-sm mb-lg">
<input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-label-bold text-label-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-lg flex items-center">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-outline uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-2 bg-surface-container-lowest border border-surface-variant hover:bg-surface-container-low text-on-surface font-label-bold text-label-bold py-3 px-4 rounded-lg transition-colors">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKVKRmP5kT8ZDN4WwEMGNDsjoAC_AN69LVZBnZcok5dcBZ3dFH_PuUKGUD6Abg-Wm2z2SrM45TlombveLIiv1tFcBIoLmr2HzjsYz8HIgr8UUSGud8jNEhzkmgkFG8ashHvyGrsp8YErpBuW1NefnhHNuqtlGmAe6l5ZWvDMlrH05Fw-0DsTlTz3YmWF2OriRLAxS7YX94DyaAKZv-07o1jQIddXNQEPugF98nk4sD3Zzop70DGW-CZzOtHXFpah9iFZp1gBICxYQ"/>
                Google
            </button>
<button class="flex items-center justify-center gap-2 bg-inverse-surface hover:bg-on-surface text-inverse-on-surface font-label-bold text-label-bold py-3 px-4 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">ios</span>
                Apple
            </button>
</div>
<!-- Sign Up Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-bold text-label-bold text-primary-container hover:text-primary transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
