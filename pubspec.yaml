name: petafinds
description: "PetaFinds - Discover local businesses, products, and deals."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3

  # Routing
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
